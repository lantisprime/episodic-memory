name: Plan-marker enforcement validation

# #268 fix F16: this workflow runs on EVERY PR/push (no `paths:` filter)
# because the validator's job is to DETECT new unregistered enforcement
# sites. A paths-filtered workflow can't catch sites added in files
# outside the filter — the same class as plan v6's own call-site-closure
# lesson, just moved to workflow triggering (codex r1 F5).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate plan-marker enforcement-site drift (D0 + D2)
        run: node scripts/validate-plan-marker-sites.mjs

      - name: Run plan-marker helper unit tests (H1-H13 + H3-bis)
        run: node tests/test-plan-marker.mjs

      - name: Run plan-marker cross-session E2E tests (X1-X13)
        run: node tests/test-plan-marker-cross-session.mjs

      - name: Run plan-marker classifier tests (E1-E5 + E5b + F-3 + F17/F18)
        run: bash tests/test-plan-marker-classifier.sh

      - name: Run checkpoints-migration regression (verifies F12 + legacy preserved)
        run: node tests/test-checkpoints-migration.mjs

      - name: Run em-recall session-start orphan-sweep regression
        run: node tests/test-em-recall-session-start-early-exit.mjs

      - name: Run em-recall plan-marker sweep regression (2026-05-18 concurrent-session fix)
        run: node tests/test-em-recall-plan-marker-sweep.mjs

      - name: Run em-recall force-monotonic baseline regression (2026-05-18 orphan-deadlock fix)
        run: node tests/test-em-recall-baseline-monotonic.mjs

      - name: Run session-start repo-root/worktree resolution regression (#106)
        run: node tests/test-em-repo-root-worktree.mjs

      - name: Run bp-001 per-project arming regression (advisory, RFC-008 P3d)
        run: node tests/test-bp001-per-project-arming.mjs

      - name: Run em-recall-sessionstart hook-wrapper integration (cwd + stdin sid binding)
        run: bash tests/test-em-recall-sessionstart-hook-binding.sh

      - name: Run em-recall-sessionstart hook regression (incl. F1 freshness-probe layout fix)
        run: bash tests/test-em-recall-sessionstart.sh

      - name: Run preflight-marker reapers (F4 SessionEnd reap + SessionStart 7d orphan sweep)
        run: node tests/test-preflight-marker-reapers.mjs

      - name: Run preflight-gate foreign-project regression (#441 — real install, no scripts/ tree, edits allowed)
        run: bash tests/test-preflight-gate-foreign-project.sh

      - name: Run hook-body repo-relative-scripts class-check (#441 — no fail-closed sole $REPO_ROOT/scripts dep)
        run: node tests/test-hook-bodies-no-repo-relative-scripts.mjs

      - name: Run no-legacy-plan-marker-writes detector (Rule 13)
        run: node tests/test-no-legacy-plan-marker-writes.mjs

      - name: Run em-strict-lstat regression
        run: node tests/test-em-strict-lstat.mjs

      - name: Run marker-state carve-out unit tests (incl. #268 cross-session foreign-sid exclusion)
        run: node tests/test-marker-state.mjs

      - name: Run issue-146 plan-pending deferral regression
        run: node tests/test-issue-146.mjs

      - name: Run command-classifier full regression
        run: bash tests/test-command-classifier.sh

      - name: Run classifier-marker hardening + multi-session/multi-project tests (PR #331)
        run: node tests/test-classifier-marker.mjs

      - name: Run agent-classifier (shell wrapper + dispatcher + marker hot path) tests (PR #331; renamed PR-B)
        run: node tests/test-agent-classifier.mjs

      - name: Run checkpoint-gate regression (incl. F1 Bash re-gate + .review-store carve-out, PR-B)
        run: bash tests/test-checkpoint-gate.sh

      - name: Run plan-gate regression (incl. P4a/P4d session_id fail-closed guard)
        run: bash tests/test-plan-gate.sh

      - name: Run install-hooks regression (incl. PR-B orphan sweep + manifest count)
        run: bash tests/test-install-hooks.sh

      - name: Run install dedup regression (RFC-008 P4d double-registration prune)
        run: node tests/test-install-dedup.mjs

      - name: Run stop-gate regression
        run: bash tests/test-stop-gate.sh

      - name: Run enforce-contract --gate stop relocation + parity + tier layer (RFC-008 P3b-1/P3b-2)
        run: node tests/test-enforce-contract.mjs

      - name: Run --resolve-gate per-project pre_tool_use consult (RFC-008 P4a, R3/R5 — gateDisposition + closed-token CLI)
        run: node tests/test-resolve-gate.mjs

      - name: Run --resolve-gate bash bridge contract (RFC-008 P4a, F5 — exact-token match, ||-envelope fail-closed, plan-gate honors silence/clamp)
        run: bash tests/test-resolve-gate-bridge.sh

      - name: Run --layer-active per-project kill switch (RFC-008 P4c, R5 — layerDisposition + closed-token CLI + F1 session-start fold)
        run: node tests/test-layer-active.mjs

      - name: Run --layer-active bash+node bridge (RFC-008 P4c, R5 — preflight + second-opinion honor inactive; F1 ENOENT fail-closed; G4 marker-write survives)
        run: bash tests/test-layer-active-bridge.sh

      - name: Run enforce-contract --session-start side-effects relocation (RFC-008 P3d)
        run: node tests/test-enforce-contract-session-start.mjs

      - name: Run bp-001 advisory lib regression (RFC-008 P3d, F7)
        run: node tests/test-bp001-advisory.mjs

      - name: Run em-recall enforcement-token purity guard (RFC-008 P3d, F60)
        run: node tests/test-em-recall-purity.mjs

      - name: Run install-time em-recall purity sentinel (RFC-008 P3d, F45)
        run: node tests/test-install-em-recall-purified.mjs

      - name: Run enforce-config loader + clamp integration (RFC-008 P3b-2, R5/P4)
        run: node tests/test-enforce-config.mjs

      - name: Run install-runtime contract-set deploy coupling (RFC-008 P3b-2, §10)
        run: node tests/test-install-contract-deploy.mjs

      - name: Run activation-scoping mock-project E2E (RFC-008 P4d S1 — substrate hook-independence A0-A3 + em-* round-trips C1-C7)
        run: node tests/test-activation-scoping-e2e.mjs

      - name: Run S4 gate-toggle mock-project E2E (RFC-008 P4d S4 — seeded enforce-config.json toggles the REAL deployed stop-gate.sh block↔allow)
        run: node tests/test-s4-gate-e2e.mjs

      - name: Run P12 global-clean guardrail (RFC-008 P4d — global scope has ZERO enforcement hooks/scripts/libs/config across every install variant)
        run: node tests/test-p12-global-clean.mjs

      - name: Run enforcement-scope correction E2E (RFC-008 P4d ESC — gates block ONLY repo-source writes; episodes/reads/plan-files/off-repo allowed; per-project, no global touch)
        run: node tests/test-enforcement-scope.mjs

      - name: Run install-manifest scope + migration-cutover (RFC-008 P4d — enforcement scope:project excluded from global cutover)
        run: node tests/test-migration-cutover.mjs

      - name: Run lib-closure import-form coverage (RFC-008 P4d S2 F3 — bare/default/re-export/dynamic captured; computed not)
        run: node tests/test-lib-closure.mjs

      - name: Run second-opinion gate per-project install E2E (RFC-008 P4d — gate + libs + runbooks per-project; snapshot global)
        run: node tests/test-install-second-opinion-e2e.mjs

      - name: Run preflight-gate regression tests
        run: bash tests/test-preflight-gate.sh

      - name: Run preflight-prompt-helper regression tests
        run: bash tests/test-preflight-prompt-helper.sh

      - name: Run RFC-009 P0 hermetic pattern-health tests
        run: node tests/test-pattern-health-hermetic.mjs

      - name: Run RFC-009 P0 prune-protection tests
        run: node tests/test-prune-protection.mjs

      - name: Validate schemas (RFC-009 P1a — categories.schema.json discovered + MIN_SCHEMA_DOCS floor)
        run: node scripts/validate-schemas.mjs --project "$PWD"

      - name: Run RFC-009 P1a categories lib + schema tests
        run: node tests/test-categories-lib.mjs

      - name: Run RFC-009 P1a strict write-surface tests (store/revise/restore matrix)
        run: node tests/test-category-write.mjs

      - name: Run RFC-009 P1a category-index + --check drift tests
        run: node tests/test-category-index.mjs

      - name: Run RFC-009 P1a read-surface tolerance + index-backed --category tests
        run: node tests/test-category-search.mjs

      - name: Run RFC-009 P1a --history multi-parent walk tests
        run: node tests/test-history-walk.mjs

      - name: Run RFC-009 P1a per-category prune lifecycle tests
        run: node tests/test-prune-lifecycle.mjs

      - name: Run RFC-009 P1a categories.json global-deploy mock E2E
        run: node tests/test-install-categories.mjs

      - name: Run issue #469 prototype-key-collision regression tests
        run: node tests/test-prototype-key-collision.mjs

      - name: Run recall-v2 token-index suite (tokens.json write/read parity)
        run: node tests/test-recall-v2.mjs

  p12-invariant-gate:
    # RFC-008 P4d S8 (REQ-10 / REQ-11): the three Principle-12 invariants as ONE
    # separately-named REQUIRED check. Membership is defined in code
    # (tests/test-p12-invariant-suite.mjs glob + EXPLICIT set), not as scattered
    # YAML steps that can be dropped silently (Rule 13 + Rule 14). This job also
    # brings the S5 uninstall round-trip and the S6 seed-identity guard into CI
    # (they have no other CI step). Branch protection must mark this job a
    # required status check for the gate to bite (OD-3, applied out of band).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run the Principle-12 invariant suite (membership-in-code meta-runner)
        run: node tests/test-p12-invariant-suite.mjs
