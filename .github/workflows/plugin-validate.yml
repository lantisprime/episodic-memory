name: Plugin + schema validation

# RFC-008 P2a (Rule 13: enforce in CI, not just docs). Wires the suites P2a
# ships or touches. NO path filters (approved-plan decision, step-6 review F3):
# the suites run in seconds, and a path-filtered required check leaves
# non-matching PRs hanging on "Expected" status once the check is required —
# while a hand-curated per-file filter silently stops running when a new
# scripts/lib helper joins the import graph.
#
# #377 (closed by #504's class sweep): the full plugin-family set now runs
# here. tests/test-ci-suite-registration.mjs is the class gate — a suite
# missing from every workflow fails CI instead of hiding behind a comment.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # P2b: validate-bp-contract's stable-ID assertions (8/14) diff the
          # taxonomy/events id-sets against the merge-base with origin/main and
          # FAIL CLOSED on shallow history — full history is load-bearing.
          # N-6 (issue): on fork PRs `origin` is the fork, so the baseline is
          # fork-controlled; prefer github.base_ref if forks are ever enabled.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Node 24 (not the repo-standard 20): the OpenCode adapter is
          # TypeScript and test-opencode-adapter-conformance.mjs LOADS it as a
          # module. TS type-stripping is default-on from Node 23.6, so the
          # conformance test (PR-level review BLOCKER-2 fix) needs >=23.6. All
          # other steps here are stdlib .mjs/.sh and run unchanged on 24.
          node-version: '24'

      - name: Validate schema docs + shared negative corpus (M1/M2, #368)
        run: node scripts/validate-schemas.mjs --project "$GITHUB_WORKSPACE"

      - name: Run validate-schemas self-tests
        run: node tests/test-validate-schemas.mjs

      - name: Run P0 schema gate (corpus co-consumer — #368 divergence lock)
        run: node tests/test-p0-schemas.mjs

      - name: Run consumer-registry schema gate (#492 — installs.json flag family)
        run: node tests/test-consumer-registry-schema.mjs

      - name: Run path-contain axis tests
        run: node tests/test-path-contain.mjs

      - name: Run plugin-registry conformance tests (path-contain regression lock)
        run: node tests/test-plugin-registry.mjs

      - name: Run claude-code plugin gauntlet (REQ-1 regression lock)
        run: node tests/test-plugin-gauntlet.mjs

      # #377 remainder (surfaced by the #504 registration lint): the plugin
      # suites that were tracked in a comment here instead of running.
      - name: Run closed-subset instance-validator suite (#377)
        run: node tests/test-json-instance-validate.mjs

      - name: Run plugin.json manifest conformance suite (#377)
        run: node tests/test-plugin-json.mjs

      - name: Run field_bindings interpreter suite (#377 — key-axis closure incl. __proto__)
        run: node tests/test-field-bindings.mjs

      - name: Run plugin harness-binding suite (#377 — F31/F36/F61 project-root→store-root axes)
        run: node tests/test-plugin-harness-binding.mjs

      - name: Run opencode plugin gauntlet (RFC-008 P5, REQ-1/REQ-12)
        run: node scripts/test-plugin.mjs --project "$GITHUB_WORKSPACE" --harness opencode

      - name: Run codex plugin gauntlet (RFC-008 P6, REQ-1/REQ-6)
        run: node scripts/test-plugin.mjs --project "$GITHUB_WORKSPACE" --harness codex

      - name: Run pi-agent plugin gauntlet (RFC-008 P7, REQ-1/REQ-6 — in-process extension)
        run: node scripts/test-plugin.mjs --project "$GITHUB_WORKSPACE" --harness pi-agent

      - name: Run opencode translation tests (RFC-008 P5 S2, R3/R4)
        run: node tests/test-opencode-translations.mjs

      - name: Run repo-source parity tests (RFC-008 P5 S4, REQ-7 — bash/node single source)
        run: node tests/test-repo-source-parity.mjs

      - name: Run repo-source bash gate tests (RFC-008 P5 S4)
        run: bash tests/test-repo-source.sh

      - name: Run opencode enforce-bridge tests (RFC-008 P5 S5)
        run: node tests/test-enforce-bridge.mjs

      - name: Run opencode adapter tests (RFC-008 P5 S5, R1-R3 carve-out gate)
        run: node tests/test-opencode-adapter.mjs

      - name: Run opencode adapter conformance tests (PR-level BLOCKER-1/2 — loads enforcement.ts, asserts flat-key Hooks shape + STRONG block)
        run: node tests/test-opencode-adapter-conformance.mjs

      - name: Run codex adapter conformance tests (RFC-008 P6 S2)
        run: node tests/test-codex-adapter-conformance.mjs

      - name: Run opencode install/uninstall E2E (RFC-008 P5 S6, REQ-11)
        run: node tests/test-install-opencode-enforcement.mjs

      - name: Run codex install/uninstall E2E (RFC-008 P6 S4, REQ-11)
        run: node tests/test-install-codex-enforcement.mjs

      - name: Run pi-agent install/uninstall E2E (RFC-008 P7 S5, P12 closure)
        run: node tests/test-install-pi-enforcement.mjs

      - name: Run pi-agent adapter unit tests (RFC-008 P7 S2)
        run: node tests/test-pi-adapter.mjs

      - name: Run pi-agent bash-extractor parity (RFC-008 P7 S2, OD-1)
        run: node tests/test-pi-bash-parity.mjs

      - name: Run codex fixture + runbook §9 smoke (REQ-17)
        run: node tests/test-codex-fixture-smoke.mjs

      - name: Run effective-tier algebra tests (RFC-008 P3b-2, R3 — shared min() fold)
        run: node tests/test-effective-tier.mjs

      - name: Run structured-alert F3 writer tests (RFC-008 P3b-2, CLASS-C(b)/M1/N2)
        run: node tests/test-structured-alert.mjs

      - name: Validate bp contracts (assertions 0 + 1-15, P2b)
        run: node scripts/validate-bp-contract.mjs --project "$GITHUB_WORKSPACE"

      - name: Run validate-bp-contract self-tests (golden corpus + stable-ID E2E)
        run: node tests/test-validate-bp-contract.mjs

      - name: Run command-classifier regression suite (label-emit / _priority lock)
        run: bash tests/test-command-classifier.sh

      - name: Run classifier taxonomy runtime-sourcing tests (RFC-008 P3c, R4/F4)
        run: bash tests/test-classifier-taxonomy-sync.sh
